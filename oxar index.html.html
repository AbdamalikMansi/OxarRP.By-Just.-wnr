<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚔 نظام الشرطة | JUST&WNR</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

:root{
--bg:#05050a;
--card:rgba(15,15,25,.78);
--primary:#8b5cf6;
--green:#10b981;
--orange:#f59e0b;
--red:#ef4444;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:
radial-gradient(circle at top right,#7c3aed44,transparent 30%),
radial-gradient(circle at bottom left,#9333ea33,transparent 35%),
linear-gradient(135deg,#05050a,#0a0a14,#05050a);
min-height:100vh;
overflow-x:hidden;
color:white;
}

/* ANIMATION BACKGROUND */
body::before{
content:'';
position:fixed;
width:500px;
height:500px;
background:#7c3aed33;
filter:blur(140px);
top:-150px;
right:-150px;
animation:move1 7s infinite alternate ease-in-out;
z-index:-1;
}

body::after{
content:'';
position:fixed;
width:500px;
height:500px;
background:#9333ea22;
filter:blur(140px);
bottom:-150px;
left:-150px;
animation:move2 8s infinite alternate ease-in-out;
z-index:-1;
}

@keyframes move1{
100%{transform:translateY(80px);}
}

@keyframes move2{
100%{transform:translateX(80px);}
}

/* LOGIN */
#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:360px;
padding:35px;
border-radius:30px;
background:rgba(10,10,20,.75);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
box-shadow:
0 0 40px #7c3aed44,
0 0 90px #7c3aed22;
animation:pop .8s ease;
}

@keyframes pop{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}

.login-box h2{
text-align:center;
margin-bottom:20px;
font-size:30px;
font-weight:900;
text-shadow:0 0 15px #a855f7;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
outline:none;
border-radius:15px;
background:#0d1020;
color:white;
transition:.3s;
}

input:focus{
box-shadow:0 0 15px #8b5cf655;
transform:scale(1.02);
}

button{
border:none;
cursor:pointer;
transition:.3s;
color:white;
font-weight:bold;
}

.main-btn{
width:100%;
padding:14px;
border-radius:15px;
background:linear-gradient(135deg,#7c3aed,#9333ea);
box-shadow:0 0 20px #7c3aed66;
margin-top:10px;
}

.main-btn:hover{
transform:translateY(-3px);
}

/* APP */
#app{display:none;}

.header{
display:flex;
justify-content:space-between;
padding:20px;
background:rgba(10,10,20,.75);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,.08);
position:sticky;
top:0;
z-index:999;
animation:fadeDown .6s ease;
}

@keyframes fadeDown{
from{transform:translateY(-20px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:22px;
padding:25px;
}

.card{
background:rgba(12,12,20,.72);
backdrop-filter:blur(18px);
padding:22px;
border-radius:25px;
border:1px solid rgba(255,255,255,.06);
animation:show .6s ease;
}

@keyframes show{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#141427;
padding:15px;
color:#c084fc;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

tr:hover td{
background:#ffffff08;
transition:.3s;
}

.rank{
background:linear-gradient(135deg,#7c3aed,#9333ea);
padding:6px 12px;
border-radius:12px;
}

/* BUTTONS */
.actions{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
}

.actions button{
padding:10px 12px;
border-radius:12px;
font-size:13px;
transition:.25s;
}

.actions button:hover{
transform:translateY(-4px) scale(1.05);
}

.plus{background:#10b981;}
.minus{background:#f59e0b;}
.promo{background:#8b5cf6;}
.demote{background:#3b82f6;}
.danger{background:#ef4444;}

.locked{
pointer-events:none;
opacity:0.4;
}

/* CHART */
canvas{
background:#0c0c18;
padding:20px;
border-radius:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<h2>🚔 تسجيل الدخول</h2>

<input id="user" placeholder="يوزر">
<input id="pass" type="password" placeholder="باسورد">

<button class="main-btn" onclick="login()">دخول</button>
<p id="err"></p>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<h2>🚔 نظام الشرطة</h2>
<button class="danger" onclick="logout()">خروج</button>
</div>

<div class="container">

<div class="card">
<h3>➕ إضافة موظف</h3>
<input id="empName" placeholder="اسم">
<input id="empPoints" type="number" placeholder="نقاط">
<button class="main-btn" onclick="add()">إضافة</button>
</div>

<div class="card" style="grid-column:span 2;">
<h3>👮 الموظفين</h3>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>النقاط</th>
<th>الرتبة</th>
<th>التحكم</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<div class="card" style="grid-column:span 2;">
<canvas id="chart"></canvas>
</div>

</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("emps") || "[]");
let chart;
let role="viewer";

/* LOGIN */
function login(){

if(user.value==="Oxar" && pass.value==="Just"){
role="admin";
}
else if(user.value==="user1" && pass.value==="1"){
role="viewer";
}
else{
err.textContent="❌ خطأ";
return;
}

loginPage.style.display="none";
app.style.display="block";

render();
}

/* LOGOUT */
function logout(){
location.reload();
}

/* RANK */
const ranks=[
"مستجد","جندي","جندي أول","عريف","وكيل رقيب","رقيب",
"رقيب أول","رئيس رقباء","ملازم","ملازم أول","نقيب","رائد",
"مقدم","عقيد","عميد","لواء","فريق","فريق أول",
"نائب رئيس الشرطة","رئيس الشرطة","نائب وزير الداخلية","وزير الداخلية"
];

function autoRank(points){
let i=Math.floor(points/200);
return ranks[Math.min(i,ranks.length-1)];
}

/* ADD */
function add(){
if(role!=="admin") return;

data.push({
id:Date.now(),
name:empName.value||"بدون اسم",
points:Number(empPoints.value)||0,
rank:autoRank(Number(empPoints.value)||0),
wings:[]
});

save(); render();
}

/* SAVE */
function save(){
localStorage.setItem("emps",JSON.stringify(data));
}

/* + - */
function plus(id){
if(role!=="admin") return;

data=data.map(e=>{
if(e.id===id){
e.points+=10;
e.rank=autoRank(e.points);
}
return e;
});
save(); render();
}

function minus(id){
if(role!=="admin") return;

data=data.map(e=>{
if(e.id===id){
e.points=Math.max(0,e.points-10);
e.rank=autoRank(e.points);
}
return e;
});
save(); render();
}

/* PROMOTE / DEMOTE */
function promote(id){
if(role!=="admin") return;

data=data.map(e=>{
let i=ranks.indexOf(e.rank);
if(e.id===id && i<ranks.length-1) e.rank=ranks[i+1];
return e;
});
save(); render();
}

function demote(id){
if(role!=="admin") return;

data=data.map(e=>{
let i=ranks.indexOf(e.rank);
if(e.id===id && i>0) e.rank=ranks[i-1];
return e;
});
save(); render();
}

/* DELETE */
function del(id){
if(role!=="admin") return;

data=data.filter(e=>e.id!==id);
save(); render();
}

/* RENDER */
function render(){

tb.innerHTML="";

data.forEach(e=>{

tb.innerHTML+=`
<tr>
<td>${e.name}</td>
<td>${e.points}</td>
<td><span class="rank">${e.rank}</span></td>

<td>
<div class="actions ${role==='viewer'?'locked':''}">
<button class="plus" onclick="plus(${e.id})">+10</button>
<button class="minus" onclick="minus(${e.id})">-10</button>
<button class="promo" onclick="promote(${e.id})">ترقية</button>
<button class="demote" onclick="demote(${e.id})">تنتيل</button>
<button class="danger" onclick="del(${e.id})">حذف</button>
</div>
</td>
</tr>
`;
});

drawChart();
}

/* CHART */
function drawChart(){
if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:data.map(e=>e.name),
datasets:[{
label:"النقاط",
data:data.map(e=>e.points),
backgroundColor:"#8b5cf6"
}]
}
});
}

</script>

</body>
</html>
